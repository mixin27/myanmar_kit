name: myanmar_kit
description: "Myanmar-aware text widgets and utilities for Flutter."
version: 0.0.2
repository: https://github.com/mixin27/myanmar_kit
issue_tracker: https://github.com/mixin27/myanmar_kit/issues
topics:
  - flutter
  - text
  - typography
  - myanmar
  - localization

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

screenshots:
  - description: Showcasing the mixed of myanmar and latin language with the same size visually demo one.
    path: screenshots/demo1.png
  - description: Showcasing the mixed of myanmar and latin language with the same size visually demo two.
    path: screenshots/demo2.png
